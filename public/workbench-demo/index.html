<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plural Console — Workbench demo</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  @keyframes pc-spin { to { transform: rotate(360deg); } }
  @keyframes cc-fadeup { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .cc-fade { animation: cc-fadeup 0.3s ease-out forwards; }
  textarea::placeholder { color: var(--text-xlight); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--grey-800); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>

<script src="tour-config.js"></script>
